apiVersion: v1
kind: Namespace
metadata:
  name: churn-model
---
---
apiVersion: v1
kind: Secret
metadata:
  name: s3-creds
  namespace: churn-model
  annotations:
    serving.kserve.io/s3-endpoint: s3.us-east-2.amazonaws.com
    serving.kserve.io/s3-usehttps: "1"
    serving.kserve.io/s3-region: us-east-2
    serving.kserve.io/s3-useanoncredential: "false"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-2"
  AWS_DEFAULT_REGION: "us-east-2"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-s3-access
  namespace: churn-model
secrets:
  - name: s3-creds